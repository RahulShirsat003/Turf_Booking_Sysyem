version: 0.2
env:
  secrets-manager:
    LOGIN: TurfBooking01:sonartoken
    HOST: TurfBooking01:HOST
    Organization: TurfBooking01:Organization
    Project: TurfBooking01:Project
phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt pylint requests
      - echo "Installing SonarScanner CLI..."
      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
      - unzip sonar-scanner-cli-4.8.0.2856-linux.zip
      - export PATH=$PATH:$PWD/sonar-scanner-4.8.0.2856-linux/bin/

  build:
    commands:
      - echo "Running SonarCloud analysis..."
      - sonar-scanner \
          -Dsonar.projectKey=$Project \
          -Dsonar.organization=$Organization \
          -Dsonar.host.url=$HOST \
          -Dsonar.login=$LOGIN
      - echo "Waiting for SonarCloud Quality Gate result..."
      - sleep 10
      - curl -X GET "$HOST/api/qualitygates/project_status?projectKey=$Project" -H "Authorization: Bearer $LOGIN" > result.json
      - cat result.json
      - if [ $(jq -r '.projectStatus.status' result.json) = ERROR ]; then exit 1; fi

  post_build:
    commands:
      - echo "SonarCloud analysis completed."

artifacts:
  files:
    - result.json
  discard-paths: no