<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Turf Booking System</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #e94560);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 1000;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #e94560;
        }

        header {
            margin-top: 4rem; /* Space for the navbar */
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .content {
            width: 100%;
            max-width: 800px;
            background: #fff;
            color: #333;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            text-align: center;
            margin-top: 2rem;
        }

        .content h2 {
            color: #1a1a2e;
        }

        .content p {
            line-height: 1.6;
            margin: 1rem 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .button {
            display: inline-block;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .button-user {
            background-color: #28a745;
        }

        .button-register {
            background-color: #f4a261;
        }

        .button:hover {
            opacity: 0.9;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: #ddd;
        }

        footer a {
            color: #e94560;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </nav>

    <header>
        <h1>Welcome to Turf Booking</h1>
    </header>

    <div class="content">
        <h2>Your Turf, Your Time</h2>
        <p>Discover and book the best sports turfs in your area.</p>
        <p>Simple, fast, and convenient for all users.</p>
        <div class="buttons">
            <a href="/login" class="button button-user">Login</a>
            <a href="/register" class="button button-register">Register</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Turf Booking System. <a href="/about">Learn more</a></p>
    </footer>
</body>
</html>
